<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Snehith & Krishnapriya - Wedding Invitation</title>
  
  <!-- SEO & Open Graph / WhatsApp Sharing -->
  <meta name="title" content="Snehith & Krishnapriya | Wedding Invitation">
  <meta name="description" content="We joyfully invite you to celebrate our wedding on Sunday, 10th May 2026. Join us for a day of love and celebration!">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://snehithlal.github.io/wedding-invitation/">
  <meta property="og:title" content="Snehith & Krishnapriya | Wedding Invitation 💜">
  <meta property="og:description" content="Tap to open our digital invitation! We can't wait to celebrate with you on Sunday, 10th May 2026.">
  <meta property="og:image" content="https://snehithlal.github.io/wedding-invitation/images/og-preview.png">
  <meta property="twitter:card" content="summary_large_image">
  
  <!-- Fonts (2 Max for Premium Typography) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wedding: {
              purple: '#5B2D8E',
              lavender: '#9B7EC8',
              lilac: '#D8C8F0',
              gold: '#D4AF37',
              bg: '#F8F5FF',
              darktext: '#2D1B4E'
            }
          },
          fontFamily: {
            script: ['"Great Vibes"', 'cursive'],
            sans: ['"Montserrat"', 'sans-serif'],
            serif: ['"Montserrat"', 'sans-serif'], /* mapped safely to override old classes */
          }
        }
      }
    }
  </script>
  <style>
    /* ── Design Tokens ─── */
    :root {
        --purple:     #5B2D8E;
        --purple-mid: #7B4DB0;
        --purple-deep:#3d1a6e;
        --lavender:   #9B7EC8;
        --lilac:      #D8C8F0;
        --gold:       #D4AF37;
        --gold-light: #f0d060;
        --surface:    #FAF7FF;
        --bg-body:    #15101f;
        --text:       #2D1B4E;
        --muted:      #7a6a94;
        --radius-xl:  28px;
        --shadow:     0 18px 48px rgba(60,20,100,0.18);
        --shadow-soft:0 10px 30px rgba(60,20,100,0.12);
    }

    body {
        background:
            radial-gradient(1200px 640px at 18% 0%,  rgba(155,126,200,0.28), transparent 58%),
            radial-gradient(1000px 680px at 92% 16%, rgba(212,175,55,0.16),  transparent 60%),
            radial-gradient(920px  560px at 50% 92%, rgba(91,45,142,0.22),   transparent 58%),
            var(--bg-body);
    }

    .app-container {
        max-width: 480px;
        margin: 20px auto;
        background: var(--surface);
        min-height: calc(100vh - 40px);
        position: relative;
        border-radius: var(--radius-xl);
        box-shadow: 0 26px 70px rgba(30,10,70,0.42);
        overflow: hidden;
        border: 1px solid rgba(212,175,55,0.25);
    }
    .app-container::before {
        content: '';
        position: absolute; inset: 0;
        pointer-events: none; z-index: 0; opacity: 0.98;
        background:
            radial-gradient(900px 560px at 50% 0%,  rgba(255,255,255,0.88), rgba(255,255,255,0) 62%),
            radial-gradient(720px 520px at 10% 22%, rgba(155,126,200,0.12), transparent 62%),
            radial-gradient(720px 520px at 90% 28%, rgba(212,175,55,0.10),  transparent 62%),
            radial-gradient(700px 540px at 50% 94%, rgba(91,45,142,0.08),   transparent 66%);
    }
    .app-container > * { position: relative; z-index: 2; }

    @media (max-width: 520px) {
        .app-container { margin: 0; min-height: 100vh; border-radius: 0; border: 0; }
    }

    /* ── Bloom blobs ── */
    .bg-blobs { 
        position: absolute; inset: 0; pointer-events: none; z-index: 0; overflow: hidden;
        mask-image: linear-gradient(to bottom, black 75%, transparent 100%);
        -webkit-mask-image: linear-gradient(to bottom, black 75%, transparent 100%);
    }
    .blob {
        position: absolute; width: 340px; height: 340px;
        border-radius: 999px; filter: blur(28px); opacity: 0.16;
        animation: blobFloat 12s ease-in-out infinite;
    }
    .blob-1 { background: var(--lavender); top: -120px; left: -140px; }
    .blob-2 { background: var(--purple);   top: 120px;  right: -180px; animation-delay: -3s; }
    .blob-3 { background: var(--gold);     bottom: -160px; left: 40px; animation-delay: -6s; }
    @keyframes blobFloat {
        0%,100% { transform: translate3d(0,0,0) scale(1); }
        50%      { transform: translate3d(20px,-14px,0) scale(1.08); }
    }

    /* ── Arch photo frame ── */
    .arch-image-wrapper {
        position: relative; padding: 8px;
        border: 1.5px solid rgba(91,45,142,0.55);
        border-radius: 9rem 9rem 0 0;
        margin: 0 auto; width: 72%; max-width: 280px; background: #fff;
    }
    .arch-image {
        width: 100%; height: 100%; object-fit: cover;
        aspect-ratio: 3/4; max-height: 340px;
        border-radius: 8.5rem 8.5rem 0 0;
    }

    /* ── Rotated-border portrait ── */
    .rotated-borders-container {
        position: relative; width: 75%; max-width: 280px;
        margin: 40px auto; aspect-ratio: 1/1;
    }
    .rotated-border-1, .rotated-border-2 {
        position: absolute; inset: -12px;
        border: 1px solid rgba(212,175,55,0.65);
    }
    .rotated-border-1 { transform: rotate(4deg);  inset: -8px; }
    .rotated-border-2 { transform: rotate(-4deg); inset: -14px; }
    .photo-inner { position: absolute; inset: 0; z-index: 10; overflow: hidden; border-radius: 18px; }
    .photo-inner img { width: 100%; height: 100%; object-fit: cover; }

    /* ── Micro-interactions ── */
    .lift { transition: transform .22s ease, box-shadow .22s ease; will-change: transform; }
    .lift:hover  { transform: translateY(-2px); box-shadow: var(--shadow-soft); }
    .lift:active { transform: translateY(0) scale(0.99); }

    /* ── Fixed Map FAB ── */
    #global-map-btn {
        position: fixed; bottom: 28px;
        right: calc(50% - 240px + 20px);
        width: 60px; height: 60px;
        background: white; border-radius: 50%;
        box-shadow: 0 4px 20px rgba(0,0,0,0.16);
        border: 1px solid #e9e0f8; display: flex;
        align-items: center; justify-content: center;
        z-index: 5000; text-decoration: none;
        transition: box-shadow .2s, transform .2s;
    }
    #global-map-btn:hover, #global-map-btn:active {
        box-shadow: 0 8px 30px rgba(60,20,100,0.22);
        transform: scale(1.08);
    }
    @media (max-width: 480px) {
        #global-map-btn { right: 20px; bottom: 18px; width: 54px; height: 54px; }
    }

    /* ── Entrance anims ── */
    .fade-up { opacity: 0; transform: translateY(14px); animation: fadeUp .85s cubic-bezier(.22,1,.36,1) forwards; }
    .fade-up.d1 { animation-delay: .05s; }
    .fade-up.d2 { animation-delay: .18s; }
    .fade-up.d3 { animation-delay: .32s; }
    .fade-up.d4 { animation-delay: .46s; }
    .fade-up.d5 { animation-delay: .60s; }
    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .reveal {
        opacity: 0; transform: translateY(18px); filter: blur(8px);
        transition: opacity .8s cubic-bezier(.22,1,.36,1), transform .8s cubic-bezier(.22,1,.36,1), filter .8s cubic-bezier(.22,1,.36,1);
        will-change: transform, opacity, filter;
    }
    .reveal.in { opacity: 1; transform: translateY(0); filter: blur(0); }

    .section-animate {
        opacity: 0; transform: translateY(22px); filter: blur(6px);
        transition: opacity .75s cubic-bezier(.22,1,.36,1), transform .75s cubic-bezier(.22,1,.36,1), filter .75s cubic-bezier(.22,1,.36,1);
    }
    .section-animate.visible { opacity: 1; transform: translateY(0); filter: blur(0px); }

    ::-webkit-scrollbar { width: 0; background: transparent; }

    /* ═══════════════════════════════════════════════════════════
       ENVELOPE COVER SCREEN
    ═══════════════════════════════════════════════════════════ */
    #envelope-cover {
        position: absolute; inset: 0; z-index: 100;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background:
            radial-gradient(ellipse 80% 60% at 50% 0%,  rgba(255,255,255,0.90) 0%, transparent 70%),
            radial-gradient(ellipse 60% 50% at 10% 30%, rgba(155,126,200,0.20) 0%, transparent 60%),
            radial-gradient(ellipse 60% 50% at 90% 30%, rgba(212,175,55,0.14)  0%, transparent 60%),
            radial-gradient(ellipse 50% 40% at 50% 95%, rgba(91,45,142,0.14)   0%, transparent 60%),
            #F5F0FF;
        transition: opacity .9s ease, transform .9s ease;
        overflow: hidden;
    }
    #envelope-cover.hidden {
        opacity: 0; transform: translateY(-28px); pointer-events: none;
    }

    /* ── Floral corners ── */
    .env-floral {
        position: absolute; width: 165px; opacity: 0.68;
        pointer-events: none;
    }
    .env-floral.tl { top: -8px;  left: -8px;  animation: floralTL 7s ease-in-out infinite; }
    .env-floral.tr { top: -8px;  right: -8px; animation: floralTR 7s ease-in-out infinite; animation-delay: -2s; }
    .env-floral.bl { bottom: -8px; left: -8px; animation: floralBL 7s ease-in-out infinite; animation-delay:-3.5s; }
    .env-floral.br { bottom: -8px; right:-8px; animation: floralBR 7s ease-in-out infinite; animation-delay: -5s; }
    @keyframes floralTL { 0%,100%{transform:rotate(0deg) translate(0,0)} 50%{transform:rotate(0deg) translate(3px,-6px)} }
    @keyframes floralTR { 0%,100%{transform:rotate(90deg) translate(0,0)}  50%{transform:rotate(90deg) translate(3px,-6px)} }
    @keyframes floralBL { 0%,100%{transform:rotate(270deg) translate(0,0)} 50%{transform:rotate(270deg) translate(3px,-6px)} }
    @keyframes floralBR { 0%,100%{transform:rotate(180deg) translate(0,0)} 50%{transform:rotate(180deg) translate(3px,-6px)} }

    /* ── Cover text ── */
    .env-top-label {
        font-family: 'Montserrat', sans-serif;
        font-size: 10px; letter-spacing: .32em; text-transform: uppercase;
        color: rgba(61,26,110,0.6); font-weight: 600;
        margin-bottom: 16px;
        animation: fadeUp 1s ease .1s both;
    }
    .env-names {
        font-family: 'Great Vibes', cursive;
        font-size: clamp(2.4rem, 9vw, 3.2rem);
        color: #3d1a6e; text-align: center;
        line-height: 1.1; margin-bottom: 22px;
        animation: fadeUp 1s ease .25s both;
    }
    .env-date {
        font-family: 'Montserrat', sans-serif;
        font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
        color: rgba(61,26,110,0.55); font-weight: 500;
        margin-top: 20px;
        animation: fadeUp 1s ease .55s both;
    }

    /* ═══ The Envelope ═══ */
    .envelope-wrap {
        position: relative; width: min(72vw, 300px);
        cursor: pointer;
        animation: fadeUp 1s ease .4s both;
        user-select: none; -webkit-tap-highlight-color: transparent;
    }
    .envelope-body {
        position: relative; width: 100%; aspect-ratio: 1.45 / 1;
        border-radius: 6px 6px 14px 14px;
        background: linear-gradient(160deg, #6835a0 0%, #4e228a 55%, #3a1470 100%);
        box-shadow:
            0 22px 60px rgba(45,15,90,0.42),
            0 6px 20px rgba(0,0,0,0.18),
            inset 0 1px 0 rgba(255,255,255,0.12);
    }
    /* inner shimmer */
    .envelope-inner {
        position: absolute; inset: 0;
        background:
            linear-gradient(135deg, rgba(212,175,55,0.10) 0%, transparent 50%),
            linear-gradient(225deg, rgba(155,126,200,0.18) 0%, transparent 50%);
        border-radius: inherit;
    }
    /* bottom V flap */
    .envelope-bottom {
        position: absolute; bottom: 0; left: 0; right: 0;
        overflow: hidden; height: 52%;
        filter: drop-shadow(0 -3px 5px rgba(0,0,0,0.4));
    }
    .envelope-bottom::before {
        content: ''; position: absolute; bottom: 0; left: -2px; right: -2px;
        height: 200%;
        background: linear-gradient(160deg, #5a2890 0%, #38106a 100%);
        clip-path: polygon(0% 100%, 50% 0%, 100% 100%);
        opacity: 0.72;
    }
    /* side flaps */
    .envelope-left {
        position: absolute; top: 0; left: 0; width: 52%; height: 100%;
        background: linear-gradient(110deg, #7040b0 0%, #5228a0 100%);
        clip-path: polygon(0% 0%, 100% 50%, 0% 100%);
        filter: drop-shadow(2px 0px 4px rgba(0,0,0,0.3));
    }
    .envelope-right {
        position: absolute; top: 0; right: 0; width: 52%; height: 100%;
        background: linear-gradient(250deg, #7040b0 0%, #5228a0 100%);
        clip-path: polygon(100% 0%, 0% 50%, 100% 100%);
        filter: drop-shadow(-2px 0px 4px rgba(0,0,0,0.3));
    }
    /* top animated flap */
    .envelope-flap-wrap {
        position: absolute; top: 0; left: 0; right: 0; height: 52%;
        transform-origin: top center;
        transform-style: preserve-3d;
        transition: transform .9s cubic-bezier(.4,0,.2,1);
        z-index: 10;
    }
    .envelope-flap {
        position: absolute; inset: 0;
        background: linear-gradient(170deg, #7b48b8 0%, #5e30a0 50%, #4a1e88 100%);
        clip-path: polygon(0% 0%, 50% 100%, 100% 0%);
        box-shadow: 0 4px 16px rgba(0,0,0,0.22);
    }
    .envelope-flap::after {
        content: ''; position: absolute; inset: 0;
        background: linear-gradient(170deg, rgba(212,175,55,0.24) 0%, transparent 40%);
        clip-path: polygon(0% 0%, 50% 100%, 100% 0%);
    }
    /* open: flap rotates back */
    .envelope-wrap.is-open .envelope-flap-wrap { transform: rotateX(-180deg); }

    /* ═══ Wax Seal ═══ */
    .wax-seal-wrap {
        position: absolute; left: 50%; top: 50%;
        transform: translate(-50%, -50%);
        z-index: 20; cursor: pointer;
        transition: transform .3s ease;
    }
    .wax-seal-wrap:hover  { transform: translate(-50%,-50%) scale(1.07); }
    .wax-seal-wrap:active { transform: translate(-50%,-50%) scale(0.96); }
    .wax-seal { position: relative; width: 104px; height: 104px; margin-top: -6px; }

    .seal-ring-text {
        position: absolute; inset: 0;
        animation: sealSpin 12s linear infinite;
    }
    @keyframes sealSpin { to { transform: rotate(360deg); } }

    /* Wax seal pulse animation */
    .pulse-ring {
        position: absolute; inset: -18px;
        border-radius: 50%;
        background: rgba(212,175,55,0.45);
        z-index: -1;
        animation: pulseAnimate 2s infinite ease-out;
        pointer-events: none;
    }
    @keyframes pulseAnimate {
        0% { transform: scale(0.8); opacity: 1; }
        100% { transform: scale(1.4); opacity: 0; }
    }

    .seal-gold-circle {
        position: absolute; inset: 18px; border-radius: 50%;
        background: radial-gradient(circle at 36% 36%, #f5e070 0%, #D4AF37 42%, #a8870d 100%);
        box-shadow:
            0 3px 12px rgba(0,0,0,0.38),
            0 1px 4px rgba(0,0,0,0.20),
            inset 0 1px 2px rgba(255,255,255,0.45),
            inset 0 -1px 2px rgba(0,0,0,0.28);
    }
    .seal-monogram {
        position: absolute; inset: 18px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-family: 'Great Vibes', cursive; font-size: 22px;
        color: #3a0e6e; text-shadow: 0 1px 2px rgba(255,255,255,0.5);
        z-index: 2;
    }
    /* seal disappears on open */
    .envelope-wrap.is-open .wax-seal-wrap {
        opacity: 0; transform: translate(-50%,-50%) scale(0.5);
        transition: opacity .4s ease, transform .4s ease;
    }

    /* Tap Prompt */
    .env-tap-prompt {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        margin-top: 30px; gap: 8px;
        animation: fadeUp 1s ease 1.2s both;
        pointer-events: none;
    }
    .env-tap-prompt svg {
        width: 18px; height: 18px; color: #D4AF37;
        animation: subtleBounce 2s infinite ease-in-out;
    }
    .env-tap-prompt span {
        font-family: 'Montserrat', sans-serif;
        font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase;
        color: #5B2D8E; font-weight: 600; opacity: 0.85;
    }
    @keyframes subtleBounce {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-5px); }
    }

    /* ═══ Invitation Reveal ═══ */
    #invitation-reveal {
        position: absolute; top: 0; inset: 0;
        overflow-y: auto; opacity: 0; pointer-events: none;
        transition: opacity .8s ease .5s; z-index: 50;
    }
    #invitation-reveal.visible { opacity: 1; pointer-events: auto; }

    /* ═══ Petal burst ═══ */
    .petal {
        position: absolute; width: 10px; height: 10px;
        border-radius: 50% 0 50% 0; pointer-events: none;
        opacity: 0; z-index: 200;
    }
    .petal.burst { animation: petalBurst var(--dur,1.2s) var(--delay,0s) cubic-bezier(.25,.46,.45,.94) forwards; }
    @keyframes petalBurst {
        0%   { opacity: 1; transform: translate(0,0) rotate(0deg) scale(1); }
        80%  { opacity: .6; }
        100% { opacity: 0; transform: translate(var(--tx,60px),var(--ty,-80px)) rotate(var(--rot,180deg)) scale(.35); }
    }

    /* ═══════════════════════════════════════════════════════════
       INNER PAGE — Purple/Gold theme overrides
    ═══════════════════════════════════════════════════════════ */

    /* Re-map Tailwind wedding-red / wedding-rose to purple vars for inner page */
    #app-inner .text-wedding-red   { color: var(--purple) !important; }
    #app-inner .text-wedding-rose  { color: var(--lavender) !important; }
    #app-inner .bg-wedding-red     { background-color: var(--purple) !important; }
    #app-inner .bg-wedding-bg      { background-color: var(--surface) !important; }
    #app-inner .shadow-wedding-red { box-shadow: 0 4px 20px rgba(91,45,142,0.22) !important; }
    #app-inner .border-wedding-red { border-color: rgba(91,45,142,0.22) !important; }
    #app-inner .text-wedding-gold  { color: var(--gold) !important; }

    /* Hero separator SVG colour */
    #app-inner .text-wedding-gold { color: var(--gold); }

    /* Inner page background wash */
    #app-inner {
        background: radial-gradient(ellipse 100% 40% at 50% 0%, rgba(216,200,240,0.35) 0%, transparent 80%);
        min-height: 100vh;
    }
    #app-inner section {
        background: transparent !important;
    }

    /* Arch frame border */
    #app-inner .arch-image-wrapper { border-color: rgba(91,45,142,0.60) !important; }

    /* Countdown box */
    #app-inner .bg-white\/70 {
        background: rgba(248,245,255,0.82) !important;
        border-color: rgba(91,45,142,0.14) !important;
    }

    /* Action buttons */
    #app-inner a.bg-wedding-red,
    #app-inner a[class*="bg-wedding-red"] {
        background: var(--purple) !important;
        box-shadow: 0 4px 20px rgba(91,45,142,0.32) !important;
    }
    #app-inner a.bg-wedding-red:hover { background: var(--purple-mid) !important; }

    /* Info cards */
    #app-inner .rounded-2xl.bg-white\/72 {
        background: rgba(248,245,255,0.82) !important;
        border-color: rgba(91,45,142,0.10) !important;
    }
    /* icon circles */
    #app-inner .bg-wedding-red\/10 { background: rgba(91,45,142,0.10) !important; }
    #app-inner svg[stroke="#8B1538"] { color: var(--purple) !important; }

    /* Wedding rings SVG */
    #app-inner circle[stroke="#8B1538"] { stroke: var(--purple) !important; }
    #app-inner circle[stroke="#D4AF37"] { stroke: var(--gold) !important; }

    /* Rotated borders */
    #app-inner .rotated-border-1,
    #app-inner .rotated-border-2 { border-color: rgba(212,175,55,0.65) !important; }

    /* Font script in inner */
    #app-inner .font-script { color: var(--purple-deep) !important; }
    #app-inner h2.font-script { color: var(--purple) !important; }
    #app-inner h3.font-script { color: var(--purple-deep) !important; }
    #app-inner .font-serif.text-wedding-red { color: var(--purple) !important; }

    /* Save calendar button (outline) */
    #app-inner .border-black\/10 { border-color: rgba(91,45,142,0.18) !important; }

    /* map button global */
    #global-map-btn svg { color: var(--purple) !important; }
    #global-map-btn { border-color: rgba(91,45,142,0.15); }
    #global-map-btn:hover { box-shadow: 0 8px 30px rgba(91,45,142,0.22); }
  </style>
</head>
<body class="font-sans antialiased text-gray-800">

  <!-- Global Fixed Map Button -->
  <a id="global-map-btn" href="#" target="_blank" aria-label="Open in Google Maps">
    <svg viewBox="0 0 24 24" style="width:28px;height:28px;color:#5B2D8E" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
      <circle cx="12" cy="10" r="3"></circle>
    </svg>
  </a>

  <div class="app-container" id="app">

    <!-- ══ ENVELOPE COVER ══ -->
    <div id="envelope-cover">

      <!-- Floral corner decorations — purple/lavender palette -->
      <svg class="env-floral tl" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <g>
          <ellipse cx="40" cy="160" rx="13" ry="36" fill="#6a8c5e" transform="rotate(-30 40 160)" opacity="0.68"/>
          <ellipse cx="60" cy="145" rx="11" ry="30" fill="#5a7e50" transform="rotate(-10 60 145)" opacity="0.62"/>

  <script>
    function openEnvelope() {
      const env = document.getElementById('envelope');
      if (env.classList.contains('is-open')) return;
      env.classList.add('is-open');
      burstPetals();
      setTimeout(() => {
        const cover  = document.getElementById('envelope-cover');
        const reveal = document.getElementById('invitation-reveal');
        reveal.classList.add('visible');
        setTimeout(() => {
          cover.classList.add('hidden');
          reveal.style.overflowY = 'auto';
        }, 900);
      }, 700);
    }

    function burstPetals() {
      const cover = document.getElementById('envelope-cover');
      const cx = cover.clientWidth / 2, cy = cover.clientHeight / 2;
      // Purple + gold petal palette
      const colors = ['#9B7EC8','#5B2D8E','#D4AF37','#c4a8e8','#f0d060','#B89ED8'];
      for (let i = 0; i < 22; i++) {
        const p = document.createElement('div');
        p.className = 'petal';
        const angle = (360/22)*i + Math.random()*18 - 9;
        const dist  = 80 + Math.random()*110;
        const rad   = angle * Math.PI / 180;
        const tx = Math.cos(rad)*dist, ty = Math.sin(rad)*dist - 30;
        p.style.cssText = `left:${cx}px;top:${cy}px;background:${colors[i%colors.length]};--tx:${tx}px;--ty:${ty}px;--rot:${180+Math.random()*200}deg;--dur:${0.7+Math.random()*0.7}s;--delay:${Math.random()*0.25}s;`;
        p.classList.add('burst');
        cover.appendChild(p);
        setTimeout(()=>p.remove(), 2200);
      }
    }
  </script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Snehithlal & Krishnapriya - Wedding Invitation</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            wedding: {
              green: '#3A6B35', // Match the dark green from the screenshot
              box: '#5c8551',
              pink: '#D3727A',  // Match the pink text
              bg: '#FFFFFF',
              darktext: '#1F2937'
            }
          },
          fontFamily: {
            script: ['"Great Vibes"', 'cursive'],
            serif: ['"Playfair Display"', 'serif'],
            sans: ['"Poppins"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    /* Base + theme */
    :root {
        --bg: #f5f6f8;
        --surface: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --ring: rgba(17, 24, 39, 0.12);
        --shadow: 0 18px 45px rgba(0, 0, 0, 0.12);
        --shadow-soft: 0 10px 30px rgba(0, 0, 0, 0.10);
        --radius-xl: 28px;
    }

    body {
        background:
            radial-gradient(1100px 500px at 20% 0%, rgba(211,114,122,0.12), transparent 55%),
            radial-gradient(900px 500px at 85% 20%, rgba(58,107,53,0.12), transparent 50%),
            var(--bg);
    }

    .app-container {
        max-width: 480px;
        margin: 20px auto;
        background-color: var(--surface);
        min-height: calc(100vh - 40px);
        position: relative;
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
        overflow: hidden;
        border: 1px solid rgba(17, 24, 39, 0.06);
    }

    @media (max-width: 520px) {
        .app-container {
            margin: 0 auto;
            min-height: 100vh;
            border-radius: 0;
            border: 0;
        }
    }

    /* Subtle animated background blobs */
    .bg-blobs {
        position: absolute;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        overflow: hidden;
    }
    .blob {
        position: absolute;
        width: 340px;
        height: 340px;
        border-radius: 999px;
        filter: blur(28px);
        opacity: 0.18;
        transform: translate3d(0,0,0);
        animation: blobFloat 12s ease-in-out infinite;
    }
    .blob.blob-1 { background: #D3727A; top: -120px; left: -140px; }
    .blob.blob-2 { background: #3A6B35; top: 120px; right: -180px; animation-delay: -3s; }
    .blob.blob-3 { background: #d2b48c; bottom: -160px; left: 40px; animation-delay: -6s; }

    @keyframes blobFloat {
        0%, 100% { transform: translate3d(0,0,0) scale(1); }
        50% { transform: translate3d(20px, -14px, 0) scale(1.08); }
    }
    
    /* Arch image style */
    .arch-image-wrapper {
        position: relative;
        padding: 8px;
        border: 1.5px solid #222;
        border-radius: 9rem 9rem 0 0;
        margin: 0 auto;
        width: 80%;
        max-width: 320px;
        background: #fff;
    }
    .arch-image {
        width: 100%;
        height: 100%;
        object-fit: cover;
        aspect-ratio: 3/4;
        border-radius: 8.5rem 8.5rem 0 0;
    }
    
    /* Double rotated border for 'About Us' photos */
    .rotated-borders-container {
        position: relative;
        width: 75%;
        max-width: 280px;
        margin: 40px auto;
        aspect-ratio: 1/1;
    }
    .rotated-border-1, .rotated-border-2 {
        position: absolute;
        inset: -12px;
        border: 1px solid #d2b48c;
    }
    .rotated-border-1 { transform: rotate(4deg); inset: -8px;}
    .rotated-border-2 { transform: rotate(-4deg); inset: -14px;}
    
    .photo-inner {
        position: absolute;
        inset: 0;
        z-index: 10;
        overflow: hidden;
    }
    .photo-inner img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }
    
    /* Global Fixed Map Button */
    #global-map-btn {
        position: fixed;
        bottom: 28px;
        right: calc(50% - 240px + 20px); /* right edge of the app container */
        width: 60px;
        height: 60px;
        background-color: white;
        border-radius: 50%;
        box-shadow: 0 4px 20px rgba(0,0,0,0.18);
        border: 1px solid #e5e7eb;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 5000;
        transition: box-shadow 0.2s, transform 0.2s;
        text-decoration: none;
    }
    #global-map-btn:hover, #global-map-btn:active {
        box-shadow: 0 8px 30px rgba(0,0,0,0.22);
        transform: scale(1.08);
    }

    /* On small screens, right edge of app = right edge of screen */
    @media (max-width: 480px) {
        #global-map-btn {
            right: 20px;
        }
    }
    
    /* Watermark decoration */
    .watermark {
        position: absolute;
        opacity: 0.15;
        z-index: 0;
        pointer-events: none;
    }
    .watermark-top {
        top: 0;
        left: 0;
        width: 200px;
        transform: translate(-30%, -30%);
    }
    .watermark-bottom {
        bottom: 0;
        right: 0;
        width: 200px;
        transform: translate(30%, 30%) rotate(180deg);
    }
    
    /* Section entrance animation */
    .section-animate {
        opacity: 0;
        transform: translateY(22px);
        filter: blur(6px);
        transition:
            opacity 0.75s cubic-bezier(0.22, 1, 0.36, 1),
            transform 0.75s cubic-bezier(0.22, 1, 0.36, 1),
            filter 0.75s cubic-bezier(0.22, 1, 0.36, 1);
    }
    .section-animate.visible {
        opacity: 1;
        transform: translateY(0);
        filter: blur(0px);
    }

    /* Scroll cue */
    .scroll-cue {
        position: absolute;
        bottom: 26px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        z-index: 20;
        color: rgba(31, 41, 55, 0.78);
        letter-spacing: 0.18em;
        text-transform: uppercase;
        font-size: 10px;
        user-select: none;
        pointer-events: none;
    }
    .scroll-cue .mouse {
        width: 22px;
        height: 34px;
        border: 1.5px solid rgba(31, 41, 55, 0.35);
        border-radius: 999px;
        position: relative;
        background: rgba(255, 255, 255, 0.45);
        backdrop-filter: blur(6px);
    }
    .scroll-cue .mouse::after {
        content: '';
        width: 3.5px;
        height: 6px;
        border-radius: 999px;
        background: rgba(58, 107, 53, 0.75);
        position: absolute;
        left: 50%;
        top: 7px;
        transform: translateX(-50%);
        animation: wheel 1.35s ease-in-out infinite;
    }
    @keyframes wheel {
        0%, 100% { opacity: 0.2; transform: translateX(-50%) translateY(0); }
        40% { opacity: 0.85; }
        70% { opacity: 0.2; transform: translateX(-50%) translateY(10px); }
    }

    /* Hide scrollbar for cleaner app look */
    ::-webkit-scrollbar {
        width: 0px;
        background: transparent;
    }
  </style>
</head>
<body class="font-sans antialiased text-gray-800">
  <!-- Global Fixed Map Button — always visible while scrolling -->
  <a id="global-map-btn" href="#" target="_blank" aria-label="Open in Google Maps">
    <svg viewBox="0 0 24 24" style="width:28px;height:28px;color:#3A6B35" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
      <circle cx="12" cy="10" r="3"></circle>
    </svg>
  </a>

  <div class="app-container" id="app">
    <!-- Content will be injected by script.js using data.js -->
  </div>
  
  <script src="data.js"></script>
  <script src="script.js"></script>
</body>
</html>
